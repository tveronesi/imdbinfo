name: Build and Publish to PyPI

on:
  push:
    tags:
      - 'v*.*.*'  # Runs only on version tags like v1.2.3

jobs:
  build-and-release:
    runs-on: ubuntu-22.04
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v5.0.0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip

      - name: Install dependencies
        run: pip install ".[build,test]"

      - name: Validate tag matches package version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(python - <<'PY'
          import tomllib
          with open("pyproject.toml", "rb") as f:
              data = tomllib.load(f)
          print(data["project"]["version"])
          PY
          )
          echo "Tag version: $TAG_VERSION"
          echo "Package version: $PKG_VERSION"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "Tag version does not match pyproject.toml version"
            exit 1
          fi

      - name: Check version is not already published on PyPI
        run: |
          python -m pip install requests
          python - <<'PY'
          import sys
          import tomllib
          import requests

          package_name = "imdbinfo"
          with open("pyproject.toml", "rb") as f:
              version = tomllib.load(f)["project"]["version"]

          response = requests.get(f"https://pypi.org/pypi/{package_name}/json", timeout=30)
          response.raise_for_status()
          releases = response.json().get("releases", {})

          if version in releases:
              print(f"Version {version} already exists on PyPI")
              sys.exit(1)

          print(f"Version {version} is not yet published")
          PY

      - name: Run tests
        run: pytest

      - name: Build package
        run: python -m build

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: twine upload dist/*

      - name: Extract Changelog Entry
        id: changelog
        run: |
          VERSION=${GITHUB_REF##*/v}
          ENTRY=$(awk "/^##? v$VERSION/{flag=1;next}/^##? /{flag=0}flag" CHANGELOG.md | sed '/^$/d')
          echo "CHANGELOG<<EOF" >> $GITHUB_ENV
          echo "$ENTRY" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: ${{ env.CHANGELOG }}