name: Run Tests (PR & manual)

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-22.04
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v5.0.0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Install build tools
        run: python -m pip install --upgrade pip

      - name: Install (dependencies)
        run: pip install ".[build,test]"

      - name: Run tests
        run: |
          # Move into the tests folder or set PYTHONPATH to ignore the current dir
          export PYTHONPATH=""
          python -m pytest tests/